name: Vercel Dashboard Preview

on:
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/vercel-preview.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "vercel-preview-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Vercel Preview
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_BASE_PATH: ""
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel configuration
        id: config
        shell: bash
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            {
              echo "### Vercel preview skipped"
              echo
              echo "Missing one or more required GitHub secrets: \`VERCEL_TOKEN\`, \`VERCEL_ORG_ID\`, \`VERCEL_PROJECT_ID\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        if: steps.config.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: steps.config.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build dashboard
        if: steps.config.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        if: steps.config.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        shell: bash
        run: |
          preview_url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Vercel dashboard preview"
            echo
            echo "$preview_url"
          } >> "$GITHUB_STEP_SUMMARY"

  comment:
    name: Comment Preview URL
    if: ${{ github.event_name == 'pull_request' && needs.preview.outputs.preview_url != '' }}
    needs: preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Upsert preview comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ needs.preview.outputs.preview_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- vercel-dashboard-preview -->';
            const body =
              `${marker}\n` +
              `Vercel dashboard preview: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

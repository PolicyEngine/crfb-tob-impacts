project:
  type: default
  output-dir: _build

execute:
  enabled: false

bibliography: references.bib
link-citations: true
nocite: |
  @*

format:
  html:
    toc: true
    toc-depth: 3
    number-sections: true
    theme:
      - cosmo
    smooth-scroll: true
  pdf:
    toc: true
    number-sections: true
    keep-tex: true
    geometry:
      - margin=1in
